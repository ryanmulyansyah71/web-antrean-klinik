<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Admin Tombol Antrean</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #eef2f3;
            padding: 50px;
        }
        .btn-panggil {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
            transition: transform 0.1s;
        }
        .btn-panggil:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>KONTROL STAF LOKET</h1>
    <button id="tombol-panggil" class="btn-panggil">PANGGIL ANTREAN BERIKUTNYA (+1)</button>

    <!-- KUNCI UTAMA: Dua library Firebase ini harus dimuat paling awal -->
    <script src="firebase-app-compat.js"></script>

    <!-- Script logika aplikasi -->
    <script>
        // WAJIB: Ganti dengan kode firebaseConfig asli milik Anda sendiri
        const firebaseConfig = {
            apiKey: "AIzaSyBXh2IAUXicqWAUK9VJqEEH1vR6AE5wqLQ",
            authDomain: "antrean-klinik-e890d.firebaseapp.com",
            projectId: "antrean-klinik-e890d",
            storageBucket: "antrean-klinik-e890d.firebasestorage.app",
            messagingSenderId: "9153510841",
            appId: "1:9153510841:web:3f3c0f7de584d59f9d4a68"
        };

        // Inisialisasi Firebase & Firestore
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("antrean").doc("nomor_sekarang");

        // Fungsi Transaksi untuk Menambah Antrean (+1) di Server Firebase
        function panggilBerikutnya() {
            db.runTransaction((transaction) => {
                return transaction.get(docRef).then((sfDoc) => {
                    if (!sfDoc.exists) {
                        throw "Dokumen tidak ditemukan di database Anda!";
                    }
                    const nilaiBaru = sfDoc.data().nilai + 1;
                    transaction.update(docRef, { nilai: nilaiBaru });
                });
            }).then(() => {
                console.log("Sukses! Antrean berhasil ditambah ke Firebase.");
            }).catch((error) => {
                alert("Gagal koneksi ke Firebase: " + error);
                console.error("Error Firebase:", error);
            });
        }

        // Menghubungkan fungsi ke tombol HTML di atas
        document.getElementById("tombol-panggil").addEventListener("click", panggilBerikutnya);
    </script>
</body>
</html>
