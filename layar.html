<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layar Monitor Antrean</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; margin: 0; }
        .antrean-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: inline-block; min-width: 400px; margin-top: 50px; }
        h1 { color: #34495e; font-size: 26px; margin: 0 0 20px 0; }
        #nomor-layar { font-size: 130px; font-weight: bold; color: #007bff; margin: 20px 0; line-height: 1; }
        .info { font-size: 15px; color: #7f8c8d; background: #fdfefe; padding: 12px; border-radius: 8px; border: 1px dashed #bdc3c7; }
    </style>
</head>
<body>

    <div class="antrean-card">
        <h1>NOMOR ANTREAN SEKARANG</h1>
        <div id="nomor-layar">Memuat...</div>
        <div class="info">📢 <strong>PENTING:</strong> Klik layar ini sekali dulu agar suara panggilannya aktif!</div>
    </div>

    <script>
        // DRIVER SISTEM INTERNAL - ANTI BLOKIR & ANTI ERROR "NOT DEFINED"
        (function(global) {
            var configRef = null;
            var snapshotListeners = [];

            global.firebase = {
                initializeApp: function(config) {
                    configRef = config;
                    setInterval(function() {
                        if (!configRef) return;
                        var url = "https://googleapis.com" + configRef.projectId + "/databases/(default)/documents/antrean/nomor_sekarang?key=" + configRef.apiKey;
                        fetch(url).then(function(res) { return res.json(); }).then(function(data) {
                            if (data && data.fields && data.fields.nilai) {
                                var angkaTerbaru = parseInt(data.fields.nilai.integerValue) || 0;
                                snapshotListeners.forEach(function(listener) {
                                    listener({ exists: true, data: function() { return { nilai: angkaTerbaru }; } });
                                });
                            }
                        }).catch(function(err) { console.error("Gagal sinkronisasi data cloud:", err); });
                    }, 2000);
                    return this;
                },
                firestore: function() {
                    return {
                        collection: function() {
                            return {
                                doc: function() {
                                    return {
                                        onSnapshot: function(callback) { snapshotListeners.push(callback); }
                                    };
                                }
                            };
                        }
                    };
                }
            };
        })(window);

        // CONFIG ASLI FIREBASE ANDA (VERSI LENGKAP STANDAR RESMI)
        const firebaseConfig = {
            apiKey: "AIzaSyBXh2IAUXicqWAUK9VJqEEH1vR6AE5wqLQ",
            authDomain: "antrean-klinik-e890d.firebaseapp.com",
            projectId: "antrean-klinik-e890d",
            storageBucket: "antrean-klinik-e890d.firebasestorage.app",
            messagingSenderId: "9153510841",
            appId: "1:9153510841:web:3f3c0f7de584d59f9d4a68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("antrean").doc("nomor_sekarang");

        let halamanBaruDiakses = true;

        function panggilSuara(nomor) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const kalimat = `Nomor antrean. ${nomor}. Silahkan menuju loket.`;
                const ucapan = new SpeechSynthesisUtterance(kalimat);
                ucapan.lang = 'id-ID';
                ucapan.rate = 0.85; 
                window.speechSynthesis.speak(ucapan);
            }
        }

        docRef.onSnapshot((snapshot) => {
            if (snapshot.exists) {
                const nomorBaru = snapshot.data().nilai;
                document.getElementById("nomor-layar").innerText = nomorBaru;

                if (!halamanBaruDiakses) {
                    panggilSuara(nomorBaru);
                }
                halamanBaruDiakses = false;
            }
        });
    </script>
</body>
</html>
