<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layar Monitor Antrean</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 50px;
        }
        .antrean-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-block;
        }
        #nomor-layar {
            font-size: 100px;
            font-weight: bold;
            color: #007bff;
            margin: 20px 0;
        }
        .info {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="antrean-card">
        <h1>NOMOR ANTREAN SEKARANG</h1>
        <!-- Tempat angka antrean muncul secara otomatis -->
        <div id="nomor-layar">Menghubungkan...</div>
        <div class="info">📢 Klik layar ini sekali agar suara panggilan aktif</div>
    </div>

    <!-- KUNCI UTAMA: Dua library Firebase ini harus dimuat paling awal -->
    <script src="firebase-app-compat.js"></script>

    <!-- Script logika aplikasi -->
    <script>
        // WAJIB: Ganti dengan kode firebaseConfig yang SAMA dengan admin.html
        const firebaseConfig = {
            apiKey: "AIzaSyBXh2IAUXicqWAUK9VJqEEH1vR6AE5wqLQ",
            authDomain: "antrean-klinik-e890d.firebaseapp.com",
            projectId: "antrean-klinik-e890d",
            storageBucket: "antrean-klinik-e890d.firebasestorage.app",
            messagingSenderId: "9153510841",
            appId: "1:9153510841:web:3f3c0f7de584d59f9d4a68"
        };

        // Inisialisasi Firebase & Firestore
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("antrean").doc("nomor_sekarang");

        // Penanda agar suara tidak berbunyi saat halaman pertama kali dibuka/di-refresh
        let halamanBaruDiakses = true;

        // Fungsi Suara Robot Bahasa Indonesia
        function panggilSuara(nomor) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Matikan suara sebelumnya agar tidak bertumpuk
                const kalimat = `Nomor antrean. ${nomor}. Silahkan menuju loket.`;
                const ucapan = new SpeechSynthesisUtterance(kalimat);
                ucapan.lang = 'id-ID';
                ucapan.rate = 0.9;
                window.speechSynthesis.speak(ucapan);
            }
        }

        // Mendengarkan perubahan data di Firebase secara REAL-TIME
        docRef.onSnapshot((snapshot) => {
            if (snapshot.exists) {
                const nomorBaru = snapshot.data().nilai;
                document.getElementById("nomor-layar").innerText = nomorBaru;

                // Bunyi suara hanya jika nomor berubah setelah halaman aktif
                if (!halamanBaruDiakses) {
                    panggilSuara(nomorBaru);
                }
                halamanBaruDiakses = false;
            } else {
                document.getElementById("nomor-layar").innerText = "Error: Data Kosong";
            }
        }, (error) => {
            document.getElementById("nomor-layar").innerText = "Koneksi Gagal";
            console.error("Error Real-time:", error);
        });
    </script>
</body>
</html>
